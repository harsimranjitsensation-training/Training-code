<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>
</head>
<body>
    <input type="text" required>
</body>
</html>


<script>
    localStorage.setItem("username","XYZ");
    localStorage.setItem("age", 26);

    let value = localStorage.getItem("age");
    console.log(value);

    localStorage.removeItem("age");  //to clear one item
    localStorage.clear(); //to clear all items
</script>
